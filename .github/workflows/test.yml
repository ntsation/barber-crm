name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: barberdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/barberdb_test
      run: |
        pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=100

    - name: Generate coverage report
      if: failure()
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/barberdb_test
      run: |
        echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
        pytest tests/ --cov=app --cov-report=term-missing || true
