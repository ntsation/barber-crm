services:
  api:
    platform: linux/amd64
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/barberdb
      - PROJECT_NAME=Barber CRM
      - SECRET_KEY=your-secret-key-here-change-in-production
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - barber-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    platform: linux/amd64
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: barberdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barberdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - barber-network

  tunnel:
    image: alpine:latest
    command: sh -c "apk add --no-cache openssh-client && ( [ -f /root/.ssh/id_rsa ] || ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N '' ) && ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:api:8000 localhost.run"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - barber-network

volumes:
  postgres_data:

networks:
  barber-network:
    driver: bridge
